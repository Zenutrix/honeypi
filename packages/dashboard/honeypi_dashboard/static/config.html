<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoneyPi Einstellungen</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">🍯</span><span>HoneyPi</span></div>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/config-ui" class="active">Einstellungen</a>
    </nav>
    <div class="status-badge">
      <div class="dot grey" id="sdot"></div>
      <span id="stext">…</span>
    </div>
  </header>

  <div class="config-main">

    <!-- ── Sensoren ── -->
    <div class="section-card">
      <div class="section-card-title"><span class="icon">🔌</span> Sensoren</div>
      <div class="sensor-list" id="sensor-list"></div>
      <button class="btn-add-sensor" id="add-btn" onclick="togglePicker()">
        <span style="font-size:1.1rem">＋</span> Sensor hinzufügen
      </button>
      <div class="type-picker" id="type-picker"></div>
    </div>

    <!-- ── Allgemein ── -->
    <div class="section-card">
      <div class="section-card-title"><span class="icon">⚙️</span> Allgemein</div>
      <div class="field">
        <label>Messintervall (Sekunden)</label>
        <input type="number" id="interval" min="30" max="3600" value="300">
      </div>
    </div>

    <!-- ── Datenexport ── -->
    <div class="section-card">
      <div class="section-card-title"><span class="icon">📤</span> Datenexport</div>

      <div class="exporter-item" id="exp-ts">
        <div class="exporter-header" onclick="toggleExp('ts')">
          <span>📊</span><span class="exporter-title">ThingSpeak</span>
          <span class="exporter-badge" id="badge-ts">Aus</span><span class="sensor-chevron">▾</span>
        </div>
        <div class="exporter-body" id="body-ts">
          <div class="field"><label><input type="checkbox" id="ts-on" onchange="syncBadge('ts')"> Aktiviert</label></div>
          <div class="field-row">
            <div class="field"><label>API Key</label><input type="text" id="ts-key" placeholder="XXXXXXXXXXXX"></div>
            <div class="field"><label>Channel ID (optional)</label><input type="text" id="ts-channel" placeholder="123456"></div>
          </div>
        </div>
      </div>

      <div class="exporter-item" id="exp-idb">
        <div class="exporter-header" onclick="toggleExp('idb')">
          <span>📈</span><span class="exporter-title">InfluxDB v2</span>
          <span class="exporter-badge" id="badge-idb">Aus</span><span class="sensor-chevron">▾</span>
        </div>
        <div class="exporter-body" id="body-idb">
          <div class="field"><label><input type="checkbox" id="idb-on" onchange="syncBadge('idb')"> Aktiviert</label></div>
          <div class="field-row">
            <div class="field"><label>URL</label><input type="text" id="idb-url" placeholder="http://server:8086"></div>
            <div class="field"><label>Bucket</label><input type="text" id="idb-bucket" placeholder="honeypi"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Organisation</label><input type="text" id="idb-org" placeholder="meine-org"></div>
            <div class="field"><label>Token</label><input type="password" id="idb-token" placeholder="••••••••"></div>
          </div>
        </div>
      </div>

      <div class="exporter-item" id="exp-mqtt">
        <div class="exporter-header" onclick="toggleExp('mqtt')">
          <span>📡</span><span class="exporter-title">MQTT</span>
          <span class="exporter-badge" id="badge-mqtt">Aus</span><span class="sensor-chevron">▾</span>
        </div>
        <div class="exporter-body" id="body-mqtt">
          <div class="field"><label><input type="checkbox" id="mqtt-on" onchange="syncBadge('mqtt')"> Aktiviert</label></div>
          <div class="field-row">
            <div class="field"><label>Broker</label><input type="text" id="mqtt-broker" placeholder="192.168.1.100"></div>
            <div class="field"><label>Port</label><input type="number" id="mqtt-port" value="1883"></div>
          </div>
          <div class="field"><label>Topic</label><input type="text" id="mqtt-topic" placeholder="honeypi"></div>
        </div>
      </div>
    </div>

    <!-- ── 4G ── -->
    <div class="section-card">
      <div class="section-card-title"><span class="icon">📶</span> 4G / Mobilfunk</div>
      <div id="net-status-box" class="net-status">
        <div class="net-dot grey"></div><span>Prüfe Stick…</span>
      </div>
      <div id="net-form" style="display:none">
        <div class="field-row">
          <div class="field"><label>APN</label><input type="text" id="net-apn" placeholder="z.B. internet.telekom"></div>
          <div class="field"><label>Benutzername (optional)</label><input type="text" id="net-user"></div>
        </div>
        <div class="field"><label>Passwort (optional)</label><input type="password" id="net-pass"></div>
        <div class="action-bar" style="margin-top:.75rem">
          <button class="btn btn-primary" id="net-connect-btn" onclick="netConnect()">Verbinden</button>
          <button class="btn btn-ghost" id="net-disconnect-btn" onclick="netDisconnect()" style="display:none">Trennen</button>
        </div>
      </div>
      <p id="net-unavail" style="font-size:.875rem;color:var(--muted);display:none">
        Kein 4G-Stick erkannt. USB-Stick einstecken und Seite neu laden.
      </p>
    </div>

    <!-- ── Speichern / Agent ── -->
    <div class="section-card">
      <div class="section-card-title"><span class="icon">🔧</span> Agent</div>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="saveConfig()">💾 Speichern &amp; Neustart</button>
        <button class="btn btn-ghost btn-sm" onclick="control('restart')">Neustart</button>
        <button class="btn btn-ghost btn-sm" onclick="control('stop')">Stop</button>
        <button class="btn btn-ghost btn-sm" onclick="control('start')">Start</button>
      </div>
    </div>

  </div>
  <div class="toast" id="toast"></div>

<script>
'use strict';

// ── GPIO → physischer Pin (Raspberry Pi 40-Pin Header) ────────────
const GPIO_TO_PHYS = {
  2:3, 3:5, 4:7, 5:29, 6:31, 7:26, 8:24, 9:21,
  10:19, 11:23, 12:32, 13:33, 14:8, 15:10, 16:36,
  17:11, 18:12, 19:35, 20:38, 21:40, 22:15, 23:16,
  24:18, 25:22, 26:37, 27:13
};
function gp(gpio) {
  const phys = GPIO_TO_PHYS[+gpio];
  return phys ? `GPIO ${gpio}  (Pin ${phys})` : `GPIO ${gpio}`;
}
function addrPin(addr) {
  const n = typeof addr === 'string' ? parseInt(addr, 16) : +addr;
  return ({72:'GND → 0x48', 73:'VCC → 0x49', 74:'SDA → 0x4A', 75:'SCL → 0x4B'})[n] ?? 'GND → 0x48';
}

// ── Belegungsanleitungen pro Sensor-Typ ───────────────────────────
// rows: [sensor-pin, rpi-ziel, hinweis]
// notes: zusätzliche Hinweise
const WIRING = {
  hx711: s => ({
    rows: [
      ['VCC',    '5V  (Pin 2 oder 4)', ''],
      ['GND',    'GND (Pin 6)',         ''],
      ['DT',     gp(s.data_pin  ?? 5), 'Data-Pin (konfigurierbar)'],
      ['SCK',    gp(s.clock_pin ?? 6), 'Clock-Pin (konfigurierbar)'],
      ['A+/A−',  'Wägezelle',          'Drähte je nach Zellen-Typ'],
    ],
    notes: [
      '⚖ Mehrere HX711: Jeden mit <strong>eigenen DT/SCK Pins</strong> verbinden. Sensor jeweils separat hinzufügen.',
      '🔧 Kalibrierung: <em>Referenzeinheit</em> anpassen bis das Gewicht stimmt (Bekanntes Gewicht auflegen, Wert dividieren).',
    ],
  }),
  ds18b20: s => ({
    rows: [
      ['VCC',  '3.3V (Pin 1) oder 5V (Pin 2)', ''],
      ['GND',  'GND  (Pin 6)',                  ''],
      ['DATA', 'GPIO 4  (Pin 7)',               '4,7 kΩ Pull-up zu VCC!'],
    ],
    notes: [
      `🌡 Mehrere DS18B20: Alle DATA-Leitungen <strong>parallel an GPIO 4</strong>. Pull-up (4,7 kΩ) nur <em>einmal</em> nötig.`,
      `📍 Sensor-Index ${s.sensor_index ?? 0}: Reihenfolge der Sensoren am Bus (0 = erster erkannter Sensor).`,
      '🔍 Sensor-IDs anzeigen (SSH): <code>ls /sys/bus/w1/devices/</code>',
    ],
  }),
  bme280: _s => ({
    rows: [
      ['VCC', '3.3V (Pin 1)', '⚠ Nicht 5V!'],
      ['GND', 'GND  (Pin 6)', ''],
      ['SDA', 'GPIO 2 (Pin 3)', 'I²C Data — geteilt mit anderen I²C-Sensoren'],
      ['SCL', 'GPIO 3 (Pin 5)', 'I²C Clock — geteilt mit anderen I²C-Sensoren'],
      ['SDO/ADDR', 'GND → 0x76  /  3.3V → 0x77', 'Adresse wählen'],
    ],
    notes: [
      '💡 Bis zu <strong>2× BME280</strong> möglich: SDO/ADDR-Pin bestimmt die I²C-Adresse.',
      '🔌 PCB-Hinweis: 4,7 kΩ Pull-ups auf SDA/SCL empfohlen (nur einmal auf dem Bus nötig).',
    ],
  }),
  bme680: _s => ({
    rows: [
      ['VCC', '3.3V (Pin 1)', '⚠ Nicht 5V!'],
      ['GND', 'GND  (Pin 6)', ''],
      ['SDA', 'GPIO 2 (Pin 3)', 'I²C Data'],
      ['SCL', 'GPIO 3 (Pin 5)', 'I²C Clock'],
      ['SDO/ADDR', 'GND → 0x76  /  3.3V → 0x77', 'Adresse wählen'],
    ],
    notes: [
      '💡 Bis zu <strong>2× BME680</strong> möglich: SDO/ADDR-Pin bestimmt die I²C-Adresse.',
      '💨 Gas-Sensor: Sensor muss mehrere Minuten warmlaufen für stabile Gaswiderstands-Werte.',
    ],
  }),
  bh1750: _s => ({
    rows: [
      ['VCC',  '3.3V (Pin 1)', ''],
      ['GND',  'GND  (Pin 6)', ''],
      ['SDA',  'GPIO 2 (Pin 3)', 'I²C Data'],
      ['SCL',  'GPIO 3 (Pin 5)', 'I²C Clock'],
      ['ADDR', 'GND → 0x23  /  3.3V → 0x5C', 'Adresse wählen'],
    ],
    notes: [
      '💡 Bis zu <strong>2× BH1750</strong> möglich: ADDR-Pin bestimmt die I²C-Adresse.',
    ],
  }),
  ads1115: s => ({
    rows: [
      ['VCC',  '3.3V (Pin 1)', ''],
      ['GND',  'GND  (Pin 6)', ''],
      ['SDA',  'GPIO 2 (Pin 3)', 'I²C Data'],
      ['SCL',  'GPIO 3 (Pin 5)', 'I²C Clock'],
      ['ADDR', addrPin(s.i2c_address ?? 0x48), 'I²C-Adresse wählen'],
      [`A${s.channel ?? 0} (+)`, 'Messspannung', `Kanal ${s.channel ?? 0} — Analog-Eingang`],
      ['GND (−)', 'GND', 'Referenz für Single-Ended'],
    ],
    notes: [
      '🔋 Batterie 12V: 100 kΩ zwischen Akku+ und A0, 20 kΩ zwischen A0 und GND → Teiler-Faktor = <strong>6,0</strong>.',
      '💡 Bis zu <strong>4× ADS1115</strong> möglich (ADDR-Pin: GND / VCC / SDA / SCL).',
      '📋 ADDR-Belegung: GND=0x48, VCC=0x49, SDA=0x4A, SCL=0x4B.',
    ],
  }),
};

function buildWiringHtml(type, s) {
  const w = WIRING[type]?.(s);
  if (!w) return '';
  const rows = w.rows.map(([sp, rpi, note]) =>
    `<tr>
      <td class="wt-sensor">${sp}</td>
      <td class="wt-arrow">→</td>
      <td class="wt-rpi">${rpi}</td>
      <td class="wt-note">${note}</td>
    </tr>`
  ).join('');
  const notes = w.notes.map(n => `<p class="wiring-note">${n}</p>`).join('');
  return `
    <div class="wiring-guide">
      <button class="wiring-toggle" onclick="toggleWiring(this)">
        <span>📋</span> Anschlussplan <span class="wt-arrow">▶</span>
      </button>
      <div class="wiring-content">
        <table class="wiring-table">
          <thead><tr>
            <th style="font-size:.7rem;color:var(--muted);font-weight:700;text-align:left;padding:.2rem .5rem">Sensor-Pin</th>
            <th></th>
            <th style="font-size:.7rem;color:var(--muted);font-weight:700;text-align:left;padding:.2rem .5rem">Raspberry Pi</th>
            <th style="font-size:.7rem;color:var(--muted);font-weight:700;text-align:left;padding:.2rem .5rem">Hinweis</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${notes}
      </div>
    </div>`;
}

function toggleWiring(btn) {
  const content = btn.nextElementSibling;
  const arrow = btn.querySelector('.wt-arrow');
  const open = content.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (arrow) arrow.textContent = open ? '▼' : '▶';
}

function updateWiring(idx) {
  const entry = document.querySelector(`.sensor-entry[data-idx="${idx}"]`);
  if (!entry) return;
  const wasOpen = entry.querySelector('.wiring-content')?.classList.contains('open');
  const old = entry.querySelector('.wiring-guide');
  if (old) {
    old.outerHTML = buildWiringHtml(sensors[idx].type, sensors[idx]);
    if (wasOpen) entry.querySelector('.wiring-content')?.classList.add('open');
  }
}

// ── Sensor type definitions ───────────────────────────────────────
const SENSOR_TYPES = {
  hx711: {
    label: 'HX711 — Waage (Load Cell)',
    icon: '⚖',
    multiHint: 'Mehrere möglich (eigene Pins)',
    defaults: { name: 'Waage_1', data_pin: 5, clock_pin: 6, reference_unit: 1000, samples: 5 },
    fields: [
      { key:'name',           label:'Name',                type:'text',   full:true },
      { key:'data_pin',       label:'Data Pin (GPIO)',      type:'number', wiring:true },
      { key:'clock_pin',      label:'Clock Pin (GPIO)',     type:'number', wiring:true },
      { key:'reference_unit', label:'Referenzeinheit (Kalibr.)', type:'number',
        hint:'Rohwert ÷ Referenzeinheit = kg. Kalibrieren: Bekanntes Gewicht auflegen.' },
      { key:'samples',        label:'Messwiederholungen',  type:'number', min:1, max:20 },
    ],
  },
  ds18b20: {
    label: 'DS18B20 — Temperatur (1-Wire)',
    icon: '🌡',
    multiHint: 'Mehrere am selben Bus möglich',
    defaults: { name: 'Temperatur_1', sensor_index: 0 },
    fields: [
      { key:'name',         label:'Name',                        type:'text', full:true },
      { key:'sensor_index', label:'Sensor-Index (0 = erster)',   type:'number', min:0,
        hint:'0 = erster Sensor am Bus, 1 = zweiter, usw. Alle DATA-Leitungen parallel an GPIO 4.' },
      { key:'sensor_id',    label:'Sensor-ID (optional, stabiler)', type:'text', full:true,
        hint:'z.B. 28-0000000abc12 — ls /sys/bus/w1/devices/ zum Anzeigen' },
    ],
  },
  bme280: {
    label: 'BME280 — Temp / Feuchte / Luftdruck',
    icon: '🌤',
    multiHint: 'Max. 2× (Adresse 0x76 / 0x77)',
    defaults: { name: 'Aussenklima', i2c_address: 0x76, i2c_port: 1 },
    fields: [
      { key:'name',        label:'Name',        type:'text', full:true },
      { key:'i2c_address', label:'I²C-Adresse', type:'select', isAddr:true, wiring:true,
        options:[{v:'0x76',l:'0x76 — SDO/ADDR → GND'},{v:'0x77',l:'0x77 — SDO/ADDR → VCC'}] },
    ],
  },
  bme680: {
    label: 'BME680 — Temp / Feuchte / Druck / Gas',
    icon: '💨',
    multiHint: 'Max. 2× (Adresse 0x76 / 0x77)',
    defaults: { name: 'Luftqualitaet', i2c_address: 0x76, i2c_port: 1 },
    fields: [
      { key:'name',        label:'Name',        type:'text', full:true },
      { key:'i2c_address', label:'I²C-Adresse', type:'select', isAddr:true, wiring:true,
        options:[{v:'0x76',l:'0x76 — SDO/ADDR → GND'},{v:'0x77',l:'0x77 — SDO/ADDR → VCC'}] },
    ],
  },
  bh1750: {
    label: 'BH1750 — Lichtstärke (Lux)',
    icon: '☀',
    multiHint: 'Max. 2× (Adresse 0x23 / 0x5C)',
    defaults: { name: 'Licht', i2c_address: 0x23, i2c_port: 1 },
    fields: [
      { key:'name',        label:'Name',        type:'text', full:true },
      { key:'i2c_address', label:'I²C-Adresse', type:'select', isAddr:true, wiring:true,
        options:[{v:'0x23',l:'0x23 — ADDR → GND'},{v:'0x5C',l:'0x5C — ADDR → 3.3V'}] },
    ],
  },
  ads1115: {
    label: 'ADS1115 — ADC / Batteriespannung',
    icon: '🔋',
    multiHint: 'Max. 4× (4 ADDR-Belegungen)',
    defaults: { name: 'Batterie', i2c_address: 0x48, i2c_port: 1, channel: 0, gain: '1', voltage_divider: 1.0 },
    fields: [
      { key:'name',            label:'Name',             type:'text', full:true },
      { key:'i2c_address',     label:'I²C-Adresse',      type:'select', isAddr:true, wiring:true,
        options:[{v:'0x48',l:'0x48 — ADDR→GND'},{v:'0x49',l:'0x49 — ADDR→VCC'},{v:'0x4A',l:'0x4A — ADDR→SDA'},{v:'0x4B',l:'0x4B — ADDR→SCL'}] },
      { key:'channel',         label:'Eingangs-Kanal',   type:'select', wiring:true,
        options:[{v:'0',l:'A0'},{v:'1',l:'A1'},{v:'2',l:'A2'},{v:'3',l:'A3'}] },
      { key:'gain',            label:'Gain / Messbereich', type:'select',
        options:[{v:'2/3',l:'2/3 — bis 6,1V'},{v:'1',l:'1 — bis 4,1V'},{v:'2',l:'2 — bis 2,0V'},{v:'4',l:'4 — bis 1,0V'}] },
      { key:'voltage_divider', label:'Spannungsteiler-Faktor', type:'number', step:'0.01',
        hint:'12V-Akku mit 100kΩ/20kΩ → Faktor 6,0 eingeben. Ohne Teiler: 1,0.' },
    ],
  },
};

// ── Type picker ──────────────────────────────────────────────────
const picker = document.getElementById('type-picker');
Object.entries(SENSOR_TYPES).forEach(([type, def]) => {
  const el = document.createElement('div');
  el.className = 'type-option';
  el.innerHTML = `<span class="type-icon">${def.icon}</span>
    <div>
      <div>${def.label}</div>
      ${def.multiHint ? `<div style="font-size:.7rem;color:var(--muted);font-weight:400;margin-top:.1rem">${def.multiHint}</div>` : ''}
    </div>`;
  el.onclick = () => { addSensor(type); picker.classList.remove('open'); };
  picker.appendChild(el);
});

function togglePicker() { picker.classList.toggle('open'); }

// ── Sensor list ──────────────────────────────────────────────────
let sensors = [];

function addSensor(type, data = null) {
  const def = SENSOR_TYPES[type];
  const s = data ?? { type, ...JSON.parse(JSON.stringify(def.defaults)) };
  s.type = type;
  sensors.push(s);
  renderSensors();
  // Auto-open and scroll to newest
  const entries = document.querySelectorAll('.sensor-entry');
  const last = entries[entries.length - 1];
  last?.classList.add('open');
  last?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function removeSensor(idx) {
  sensors.splice(idx, 1);
  renderSensors();
  toast('Sensor entfernt', '');
}

function renderSensors() {
  const list = document.getElementById('sensor-list');
  list.innerHTML = '';
  if (!sensors.length) {
    list.innerHTML = '<p style="font-size:.875rem;color:var(--muted);padding:.25rem 0">Noch keine Sensoren — unten einen hinzufügen.</p>';
    return;
  }
  sensors.forEach((s, idx) => renderSensorEntry(s, idx, list));
}

function renderSensorEntry(s, idx, container) {
  const def = SENSOR_TYPES[s.type] ?? { label: s.type, icon: '📟', fields: [], defaults: {} };

  const entry = document.createElement('div');
  entry.className = 'sensor-entry';
  entry.dataset.idx = idx;
  entry.dataset.type = s.type;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'sensor-header';
  hdr.innerHTML = `
    <span class="sensor-icon">${def.icon}</span>
    <div class="sensor-info">
      <strong id="sname-${idx}">${s.name || def.label}</strong>
      <small>${def.label}${def.multiHint ? ` · <span style="color:var(--blue)">${def.multiHint}</span>` : ''}</small>
    </div>
    <span class="sensor-chevron">▾</span>`;
  hdr.onclick = () => entry.classList.toggle('open');

  // Body
  const body = document.createElement('div');
  body.className = 'sensor-body';

  const fieldsDiv = document.createElement('div');
  fieldsDiv.className = 'sensor-fields';

  def.fields.forEach(f => {
    const fd = document.createElement('div');
    fd.className = 'field' + (f.full ? ' full' : '');

    const label = `<label>${f.label}${f.hint
      ? `<br><span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--faint);font-size:.73rem">${f.hint}</span>`
      : ''}</label>`;

    let input;
    if (f.type === 'select') {
      const cur = f.isAddr ? addrToHex(s[f.key]) : String(s[f.key] ?? f.options?.[0]?.v ?? '');
      input = `<select data-key="${f.key}" data-addr="${!!f.isAddr}" data-wiring="${!!f.wiring}" onchange="onFieldChange(${idx},this)">
        ${(f.options ?? []).map(o => `<option value="${o.v}"${cur === o.v ? ' selected' : ''}>${o.l}</option>`).join('')}
      </select>`;
    } else {
      const cur = s[f.key] ?? '';
      const extras = [
        f.min !== undefined ? `min="${f.min}"` : '',
        f.max !== undefined ? `max="${f.max}"` : '',
        f.step !== undefined ? `step="${f.step}"` : '',
      ].filter(Boolean).join(' ');
      const nameSync = f.key === 'name'
        ? `oninput="document.getElementById('sname-${idx}').textContent=this.value||'${def.label}'"` : '';
      const wiringSync = f.wiring ? `onchange="onFieldChange(${idx},this)"` : `onchange="onFieldChange(${idx},this)"`;
      input = `<input type="${f.type}" data-key="${f.key}" value="${cur}" ${extras} ${nameSync} ${wiringSync}>`;
    }

    fd.innerHTML = label + input;
    fieldsDiv.appendChild(fd);
  });

  const actions = document.createElement('div');
  actions.className = 'sensor-actions';
  actions.innerHTML = `<button class="btn btn-danger btn-sm" onclick="removeSensor(${idx})">× Entfernen</button>`;

  body.appendChild(fieldsDiv);
  body.insertAdjacentHTML('beforeend', buildWiringHtml(s.type, s));
  body.appendChild(actions);
  entry.appendChild(hdr);
  entry.appendChild(body);
  container.appendChild(entry);
}

function addrToHex(val) {
  if (val === undefined || val === null) return undefined;
  if (typeof val === 'number') return '0x' + val.toString(16).padStart(2, '0');
  return String(val);
}

function onFieldChange(idx, el) {
  const key = el.dataset.key;
  const isAddr = el.dataset.addr === 'true';
  const val = el.value;
  if (isAddr) {
    sensors[idx][key] = parseInt(val, 16);
  } else if (el.type === 'number') {
    sensors[idx][key] = val === '' ? undefined : parseFloat(val);
  } else {
    sensors[idx][key] = val;
  }
  if (el.dataset.wiring === 'true') updateWiring(idx);
}

// ── Exporter helpers ─────────────────────────────────────────────
function toggleExp(id) {
  document.getElementById('body-' + id).classList.toggle('open');
  document.getElementById('exp-' + id).classList.toggle('open');
}
function syncBadge(id) {
  const on = document.getElementById(id + '-on').checked;
  document.getElementById('badge-' + id).textContent = on ? 'An' : 'Aus';
  document.getElementById('exp-' + id).classList.toggle('enabled', on);
}

// ── Build config object ──────────────────────────────────────────
function buildConfig() {
  return {
    interval: parseInt(document.getElementById('interval').value) || 300,
    sensors: sensors.map(s => {
      // Remove empty optional fields
      const clean = { ...s };
      if (!clean.sensor_id) delete clean.sensor_id;
      return clean;
    }),
    exporters: {
      local:      { enabled: true, db_path: '/var/lib/honeypi/data.db' },
      thingspeak: { enabled: document.getElementById('ts-on').checked, api_key: document.getElementById('ts-key').value, channel: document.getElementById('ts-channel').value || null },
      influxdb:   { enabled: document.getElementById('idb-on').checked, url: document.getElementById('idb-url').value, token: document.getElementById('idb-token').value, org: document.getElementById('idb-org').value, bucket: document.getElementById('idb-bucket').value || 'honeypi' },
      mqtt:       { enabled: document.getElementById('mqtt-on').checked, broker: document.getElementById('mqtt-broker').value, port: parseInt(document.getElementById('mqtt-port').value) || 1883, topic: document.getElementById('mqtt-topic').value || 'honeypi' },
    },
  };
}

// ── Load config ──────────────────────────────────────────────────
async function loadConfig() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    document.getElementById('interval').value = cfg.interval ?? 300;

    sensors = [];
    (cfg.sensors ?? []).forEach(s => { if (SENSOR_TYPES[s.type]) sensors.push({ ...s }); });
    renderSensors();

    const exp = cfg.exporters ?? {};
    const fill = (id, obj, map) => map.forEach(([field, el]) => {
      const target = document.getElementById(el);
      if (!target) return;
      const val = obj?.[field];
      if (target.type === 'checkbox') target.checked = !!val;
      else if (val !== undefined && val !== null) target.value = val;
    });

    fill(null, exp.thingspeak, [['enabled','ts-on'],['api_key','ts-key'],['channel','ts-channel']]);
    fill(null, exp.influxdb,   [['enabled','idb-on'],['url','idb-url'],['token','idb-token'],['org','idb-org'],['bucket','idb-bucket']]);
    fill(null, exp.mqtt,       [['enabled','mqtt-on'],['broker','mqtt-broker'],['port','mqtt-port'],['topic','mqtt-topic']]);
    ['ts','idb','mqtt'].forEach(syncBadge);
  } catch { toast('Konfiguration konnte nicht geladen werden', 'err'); }
}

// ── Save ─────────────────────────────────────────────────────────
async function saveConfig() {
  if (!sensors.length) { toast('Mindestens einen Sensor hinzufügen', 'err'); return; }
  try {
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildConfig()),
    });
    if (!res.ok) throw new Error();
    toast('Gespeichert — Agent wird neu gestartet', 'ok');
  } catch { toast('Speichern fehlgeschlagen', 'err'); }
}

async function control(action) {
  await fetch(`/api/control/${action}`, { method: 'POST' });
  toast(`Agent: ${action}`, 'ok');
  setTimeout(loadStatus, 2000);
}

async function loadStatus() {
  try {
    const s = await fetch('/api/status').then(r => r.json());
    const dot = document.getElementById('sdot');
    const txt = document.getElementById('stext');
    dot.className = 'dot' + (s.active ? ' pulse' : ' red');
    txt.textContent = s.active ? 'Aktiv' : (s.status || 'Gestoppt');
  } catch {}
}

// ── 4G ───────────────────────────────────────────────────────────
async function loadNetwork() {
  try {
    const m = await fetch('/api/network/modem').then(r => r.json());
    const box = document.getElementById('net-status-box');
    const form = document.getElementById('net-form');
    const unavail = document.getElementById('net-unavail');
    if (!m.available) {
      box.innerHTML = `<div class="net-dot grey"></div><span>${m.reason ?? 'Kein Stick erkannt'}</span>`;
      form.style.display = 'none'; unavail.style.display = 'block'; return;
    }
    unavail.style.display = 'none'; form.style.display = '';
    const dotCls = m.connected ? 'green' : m.state === 'registered' ? 'amber' : 'grey';
    const stateLabel = m.connected ? 'Verbunden' : m.state === 'registered' ? 'Eingebucht, nicht verbunden' : m.state ?? 'Unbekannt';
    const sig = m.signal !== null ? signalBars(m.signal) : '';
    box.innerHTML = `<div class="net-dot ${dotCls}"></div><span><strong>${m.model}</strong> — ${stateLabel}</span>${sig}`;
    if (m.apn) document.getElementById('net-apn').value = m.apn;
    document.getElementById('net-connect-btn').style.display = m.connected ? 'none' : '';
    document.getElementById('net-disconnect-btn').style.display = m.connected ? '' : 'none';
  } catch {
    document.getElementById('net-status-box').innerHTML = '<div class="net-dot grey"></div><span>ModemManager nicht erreichbar</span>';
  }
}

function signalBars(pct) {
  const level = pct >= 75 ? 4 : pct >= 50 ? 3 : pct >= 25 ? 2 : 1;
  const heights = [8, 12, 16, 20];
  return `<div class="signal-bar s${level}">${heights.map(h=>`<span style="height:${h}px"></span>`).join('')}</div>`;
}

async function netConnect() {
  const apn = document.getElementById('net-apn').value.trim();
  if (!apn) { toast('APN eingeben', 'err'); return; }
  toast('Verbinde …');
  try {
    const res = await fetch('/api/network/connect', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ apn, username: document.getElementById('net-user').value, password: document.getElementById('net-pass').value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail ?? 'Fehler');
    toast('Verbunden!', 'ok'); setTimeout(loadNetwork, 2000);
  } catch (e) { toast('Fehler: ' + e.message, 'err'); }
}

async function netDisconnect() {
  await fetch('/api/network/disconnect', { method: 'POST' });
  toast('Getrennt', 'ok'); setTimeout(loadNetwork, 1500);
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────────────
loadConfig();
loadStatus();
loadNetwork();
setInterval(loadStatus, 30_000);
</script>
