<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoneyPi Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🍯</span>
      <span>HoneyPi</span>
    </div>
    <nav>
      <a href="/" class="active">Dashboard</a>
      <a href="/config-ui">Einstellungen</a>
    </nav>
    <div class="status-badge">
      <div class="dot grey" id="sdot"></div>
      <span id="stext">…</span>
    </div>
  </header>

  <main>
    <div class="page-header">
      <span class="page-title">Live-Werte</span>
      <span class="last-updated" id="ts"></span>
    </div>

    <div class="cards-grid" id="cards"></div>

    <div class="chart-card" id="chart-card" style="display:none">
      <div class="card-header">
        <span class="card-title">Verlauf</span>
        <div class="range-btns">
          <button class="btn-range" onclick="setRange(1,this)">1h</button>
          <button class="btn-range active" onclick="setRange(6,this)">6h</button>
          <button class="btn-range" onclick="setRange(24,this)">24h</button>
          <button class="btn-range" onclick="setRange(168,this)">7d</button>
        </div>
      </div>
      <canvas id="chart"></canvas>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
