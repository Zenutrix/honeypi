<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaniPi – Wartung</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-icon">🍯</span><span>HaniPi</span></a>
  <nav>
    <a href="/" class="nav-tab">Dashboard</a>
    <a href="/config-ui" class="nav-tab">Einstellungen</a>
    <a href="/hives" class="nav-tab">Stöcke</a>
    <a href="/maintenance" class="nav-tab active">Wartung</a>
  </nav>
</header>

<main>
  <div class="page-title" style="margin-bottom:16px">🔧 Wartung</div>

  <!-- Maintenance Status -->
  <div class="status-card">
    <div class="big-status">
      <span class="big-status-icon" id="maintIcon">🟢</span>
      <div class="big-status-text">
        <h2 id="maintTitle">Normalbetrieb</h2>
        <p id="maintDesc">Alle Sensoren aktiv.</p>
      </div>
      <span class="tag tag-inactive" id="maintTag">Inaktiv</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="hotspot('up')">📶 Hotspot an</button>
      <button class="btn btn-secondary btn-sm" onclick="hotspot('down')">📴 Hotspot aus</button>
    </div>
    <div class="field-hint mt-12" id="hotspotResult"></div>
  </div>

  <!-- WLAN Scanner -->
  <div class="status-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <strong>📶 WLAN-Verbindung</strong>
      <button class="btn btn-secondary btn-sm" onclick="scanWifi()">🔍 Scannen</button>
    </div>
    <div class="wifi-list" id="wifiList">
      <div class="text-muted" style="font-size:13px">Auf „Scannen" klicken um Netzwerke zu suchen.</div>
    </div>
    <div id="wifiConnectForm" class="hidden">
      <div class="field">
        <label>Passwort für <strong id="selectedSsid"></strong></label>
        <input type="password" id="wifiPassword" placeholder="Passwort">
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary btn-sm" onclick="connectWifi()">Verbinden</button>
        <button class="btn btn-secondary btn-sm" onclick="cancelWifi()">Abbrechen</button>
      </div>
    </div>
    <div class="field-hint mt-12" id="wifiResult"></div>
  </div>

  <!-- DB Stats -->
  <div class="status-card">
    <strong style="display:block;margin-bottom:12px">🗄️ Datenbank</strong>
    <div class="stats-grid" id="dbStats">
      <div class="stat-cell"><div class="stat-value" id="dbSize">…</div><div class="stat-label">Größe (MB)</div></div>
      <div class="stat-cell"><div class="stat-value" id="dbRows">…</div><div class="stat-label">Einträge</div></div>
      <div class="stat-cell"><div class="stat-value" id="dbOldest">…</div><div class="stat-label">Ältester Eintrag</div></div>
      <div class="stat-cell"><div class="stat-value" id="dbNewest">…</div><div class="stat-label">Neuester Eintrag</div></div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/"><span class="bn-icon">📊</span>Dashboard</a>
  <a href="/config-ui"><span class="bn-icon">⚙️</span>Einstellungen</a>
  <a href="/hives"><span class="bn-icon">🐝</span>Stöcke</a>
  <a href="/maintenance" class="active"><span class="bn-icon">🔧</span>Wartung</a>
</nav>

<script>
'use strict';

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleDateString('de-AT');
}

async function loadMaintenanceStatus() {
  try {
    const r = await fetch('/api/maintenance/status');
    const d = await r.json();
    const active = !!d.active;
    document.getElementById('maintIcon').textContent = active ? '🟠' : '🟢';
    document.getElementById('maintTitle').textContent = active ? 'Wartungsmodus aktiv' : 'Normalbetrieb';
    document.getElementById('maintDesc').textContent = active
      ? 'Waage(n) pausiert · Hotspot HaniPi-Setup aktiv'
      : 'Alle Sensoren aktiv.';
    document.getElementById('maintTag').textContent = active ? 'Aktiv' : 'Inaktiv';
    document.getElementById('maintTag').className = 'tag ' + (active ? 'tag-active' : 'tag-inactive');
  } catch {}
}

async function hotspot(action) {
  const res = document.getElementById('hotspotResult');
  res.textContent = 'Wird ausgeführt…';
  try {
    const r = await fetch('/api/maintenance/hotspot', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action }),
    });
    const d = await r.json();
    res.textContent = action === 'up' ? '✅ Hotspot aktiviert (SSID: HaniPi-Setup)' : '✅ Hotspot deaktiviert';
  } catch (e) {
    res.textContent = '✗ Fehler: ' + e.message;
  }
}

let selectedSsid = '';

async function scanWifi() {
  const list = document.getElementById('wifiList');
  list.innerHTML = '<div class="text-muted" style="font-size:13px">Suche…</div>';
  try {
    const r = await fetch('/api/network/wifi/scan');
    const nets = await r.json();
    if (nets.length === 0) { list.innerHTML = '<div class="text-muted" style="font-size:13px">Keine Netzwerke gefunden.</div>'; return; }
    list.innerHTML = nets.map(n => `
      <div class="wifi-item" onclick="selectWifi('${n.ssid.replace(/'/g,"\\'")}')">
        <span class="wifi-ssid">${n.ssid}</span>
        <span class="wifi-signal">${n.signal}% ${n.security || ''}</span>
      </div>`).join('');
  } catch (e) {
    list.innerHTML = '<div class="text-muted" style="font-size:13px">Fehler beim Scan.</div>';
  }
}

function selectWifi(ssid) {
  selectedSsid = ssid;
  document.getElementById('selectedSsid').textContent = ssid;
  document.getElementById('wifiConnectForm').classList.remove('hidden');
  document.getElementById('wifiResult').textContent = '';
}

function cancelWifi() {
  document.getElementById('wifiConnectForm').classList.add('hidden');
}

async function connectWifi() {
  const res = document.getElementById('wifiResult');
  res.textContent = 'Verbinde…';
  try {
    const r = await fetch('/api/network/wifi/connect', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        ssid: selectedSsid,
        password: document.getElementById('wifiPassword').value,
      }),
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.detail); }
    res.textContent = `✅ Verbunden mit ${selectedSsid}`;
    document.getElementById('wifiConnectForm').classList.add('hidden');
  } catch (e) {
    res.textContent = '✗ ' + e.message;
  }
}

async function loadDbStats() {
  try {
    const r = await fetch('/api/db/stats');
    const d = await r.json();
    document.getElementById('dbSize').textContent = d.size_mb;
    document.getElementById('dbRows').textContent = (d.row_count || 0).toLocaleString('de-AT');
    document.getElementById('dbOldest').textContent = fmtDate(d.oldest_entry);
    document.getElementById('dbNewest').textContent = fmtDate(d.newest_entry);
  } catch {}
}

loadMaintenanceStatus();
loadDbStats();
setInterval(loadMaintenanceStatus, 10000);
</script>
</body>
</html>
