<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaniPi Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-icon">🍯</span><span>HaniPi</span></a>
  <nav>
    <a href="/" class="nav-tab active">Dashboard</a>
    <a href="/config-ui" class="nav-tab">Einstellungen</a>
    <a href="/hives" class="nav-tab">Stöcke</a>
    <a href="/maintenance" class="nav-tab">Wartung</a>
  </nav>
  <div class="header-status">
    <span class="maintenance-badge" id="maintenanceBadge" title="Wartungsmodus aktiv">🔧</span>
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText" style="font-size:13px;color:var(--text-muted)">…</span>
  </div>
</header>

<main>
  <div class="hive-tabs" id="hiveTabs" style="display:none"></div>

  <div class="page-header">
    <span class="page-title">Live-Werte</span>
    <span class="last-updated" id="lastUpdated"></span>
  </div>

  <div class="time-range">
    <button class="time-btn active" data-h="1">1h</button>
    <button class="time-btn" data-h="6">6h</button>
    <button class="time-btn" data-h="24">24h</button>
    <button class="time-btn" data-h="168">7d</button>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <div class="empty-state">
      <div class="es-icon">📡</div>
      <p>Noch keine Messdaten vorhanden.</p>
      <p>Sensoren in den <a href="/config-ui">Einstellungen</a> konfigurieren.</p>
    </div>
  </div>

  <div class="chart-card hidden" id="chartCard">
    <canvas id="chart" height="260"></canvas>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/" class="active"><span class="bn-icon">📊</span>Dashboard</a>
  <a href="/config-ui"><span class="bn-icon">⚙️</span>Einstellungen</a>
  <a href="/hives"><span class="bn-icon">🐝</span>Stöcke</a>
  <a href="/maintenance"><span class="bn-icon">🔧</span>Wartung</a>
</nav>

<script src="/static/app.js"></script>
</body>
</html>
