    <div class="field-row">

        <input type="text" id="newName" placeholder="z.B. Apfelgarten">
      </div>
      <div class="field">
        <label>Farbe</label>
        <input type="color" id="newColor" value="#f59e0b" style="height:42px">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="addHive()">Hinzufügen</button>
      <button class="btn btn-secondary" onclick="toggleAddForm()">Abbrechen</button>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Stock bearbeiten</span>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="field">
        <label>Name</label>
        <input type="text" id="editName">
      </div>
      <div class="field">
        <label>Farbe</label>
        <input type="color" id="editColor" style="height:42px">
      </div>
      <button class="btn btn-primary btn-full mt-16" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<script>
'use strict';

let hives = [];
let sensorCounts = {};

async function loadHives() {
  try { const r = await fetch('/api/hives'); hives = await r.json(); } catch { hives = []; }
  try {
    const r = await fetch('/api/config');
    if (r.ok) {
      const cfg = await r.json();
      sensorCounts = {};
      (cfg.sensors || []).forEach(s => {
        if (s.hive_id) sensorCounts[s.hive_id] = (sensorCounts[s.hive_id] || 0) + 1;
      });
    }
  } catch {}
  render();
}

function render() {
  const list = document.getElementById('hiveList');
  if (hives.length === 0) {
    list.innerHTML = `<div class="empty-state" style="padding:32px 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/></svg>
      <p>Noch keine Stöcke konfiguriert.</p>
    </div>`;
    return;
  }
  list.innerHTML = '';
  hives.forEach(h => {
    const cnt = sensorCounts[h.id] || 0;
    const item = document.createElement('div');
    item.className = 'hive-item';
    item.innerHTML = `
      <span class="hive-color-dot" style="background:${h.color}"></span>
      <div class="hive-info">
        <div class="hive-item-name">${h.name}</div>
        <div class="hive-item-meta">${cnt} Sensor${cnt !== 1 ? 'en' : ''}</div>
      </div>
      <div class="hive-actions">
        <button class="icon-btn" onclick="openEdit('${h.id}')" title="Bearbeiten">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" onclick="deleteHive('${h.id}')" title="Löschen">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>`;
    list.appendChild(item);
  });
}

function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function addHive() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  await fetch('/api/hives', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, color: document.getElementById('newColor').value }),
  });
  document.getElementById('newName').value = '';
  document.getElementById('addForm').style.display = 'none';
  await loadHives();
}

function openEdit(id) {
  const h = hives.find(x => x.id === id);
  if (!h) return;
  document.getElementById('editId').value = h.id;
  document.getElementById('editName').value = h.name;
  document.getElementById('editColor').value = h.color;
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal(e) {
  if (!e || e.target === document.getElementById('editModal'))
    document.getElementById('editModal').classList.remove('open');
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  await fetch(`/api/hives/${id}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name: document.getElementById('editName').value,
      color: document.getElementById('editColor').value,
    }),
  });
  document.getElementById('editModal').classList.remove('open');
  await loadHives();
}

async function deleteHive(id) {
  if (!confirm('Stock wirklich löschen? Sensor-Zuweisungen werden aufgehoben.')) return;
  await fetch(`/api/hives/${id}`, { method: 'DELETE' });
  await loadHives();
}

loadHives();
</script>
