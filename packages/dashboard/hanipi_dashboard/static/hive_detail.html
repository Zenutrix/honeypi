<script>
'use strict';

const UNITS = {
  temperature_c:'°C', humidity_pct:'%', pressure_hpa:'hPa',
  weight_kg:'kg', voltage_v:'V', illuminance_lux:'lx', gas_resistance_ohm:'Ω',
};
const LABELS = {
  weight_kg:'Gewicht', temperature_c:'Temperatur', humidity_pct:'Feuchte',
  pressure_hpa:'Luftdruck', illuminance_lux:'Licht', gas_resistance_ohm:'Gas', voltage_v:'Spannung',
};
const HIVE_COLORS = ['#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#f97316'];

const hiveId   = location.pathname.split('/').pop();
let allHives   = [];
let thisHive   = null;
let sensorHours = 6;
let weightChart = null;
let sensorCharts = {};
let compareHiveId = null;

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleString('de-AT', {
    day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit',
  });
}

function chartOptions(unit, color) {
  return {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor:'#1a1814', borderColor:'rgba(255,255,255,0.12)', borderWidth:1,
        titleColor:'#faf6ed', bodyColor:'rgba(250,246,237,0.5)',
        callbacks: { label: ctx => `${ctx.parsed.y.toFixed(2)} ${unit}` },
      },
    },
    scales: {
      x: {
        ticks: { maxTicksLimit:8, font:{size:10.5}, color:'rgba(250,246,237,0.3)' },
        grid:  { color:'rgba(255,255,255,0.05)' },
        border:{ color:'rgba(255,255,255,0.07)' },
      },
      y: {
        ticks: { callback: v => `${v} ${unit}`, font:{size:10.5}, color:'rgba(250,246,237,0.3)' },
        grid:  { color:'rgba(255,255,255,0.05)' },
        border:{ color:'rgba(255,255,255,0.07)' },
      },
    },
  };
}

// ── Gewichtstrend ─────────────────────────────────────────────────────────────
async function loadWeightTrend() {
  const card = document.getElementById('weightTrendCard');
  const canvas = document.getElementById('weightTrendChart');
  if (!card || !canvas) return;

  // Fetch this hive's weight trend
  let trendData = null;
  try {
    const r = await fetch(`/api/data/weight-trend?hive_id=${encodeURIComponent(hiveId)}&days=30`);
    trendData = await r.json();
  } catch { return; }

  if (!trendData || !trendData.points || trendData.points.length === 0) return;
  card.style.display = 'block';

  await renderWeightChart(trendData.points, compareHiveId);
}

async function renderWeightChart(points, compareId) {
  const canvas = document.getElementById('weightTrendChart');
  if (weightChart) { weightChart.destroy(); weightChart = null; }

  const labels   = points.map(p => p.date);
  const datasets = [{
    label: thisHive ? thisHive.name : 'Dieser Stock',
    data: points.map(p => p.weight_kg),
    borderColor: thisHive ? thisHive.color : '#f59e0b',
    backgroundColor: (thisHive ? thisHive.color : '#f59e0b') + '12',
    borderWidth: 2, pointRadius: 3, tension: 0.35, fill: true,
  }];

  if (compareId) {
    try {
      const r = await fetch(`/api/data/weight-trend?hive_id=${encodeURIComponent(compareId)}&days=30`);
      const cmp = await r.json();
      const cmpHive = allHives.find(h => h.id === compareId);
      const cmpColor = cmpHive ? cmpHive.color : '#10b981';
      if (cmp && cmp.points && cmp.points.length > 0) {
        datasets.push({
          label: cmpHive ? cmpHive.name : compareId,
          data: cmp.points.map(p => ({ x: p.date, y: p.weight_kg })),
          borderColor: cmpColor,
          backgroundColor: cmpColor + '12',
          borderWidth: 2, pointRadius: 3, tension: 0.35, fill: false,
        });
      }
    } catch {}
  }

  weightChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: chartOptions('kg', thisHive ? thisHive.color : '#f59e0b'),
  });
}

// ── Vergleichs-Buttons ────────────────────────────────────────────────────────
function renderCompareButtons(primaryPoints) {
  const container = document.getElementById('compareButtons');
  if (!container) return;
  const others = allHives.filter(h => h.id !== hiveId);
  if (others.length === 0) { container.style.display = 'none'; return; }

  const btns = [
    `<button type="button" class="hive-pick-btn${!compareHiveId ? ' active' : ''}"
       onclick="setCompare(null, this)">
       <span class="hive-pick-none">—</span> Kein Vergleich
     </button>`,
    ...others.map(h => `
      <button type="button" class="hive-pick-btn${compareHiveId===h.id ? ' active' : ''}"
        onclick="setCompare('${h.id}', this)">
        <span class="hive-dot" style="background:${h.color}"></span>${h.name}
      </button>`),
  ];
  container.innerHTML = btns.join('');
}

async function setCompare(id, btn) {
  compareHiveId = id;
  document.querySelectorAll('#compareButtons .hive-pick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Re-fetch this hive's points and re-render
  try {
    const r = await fetch(`/api/data/weight-trend?hive_id=${encodeURIComponent(hiveId)}&days=30`);
    const d = await r.json();
    if (d && d.points) await renderWeightChart(d.points, compareHiveId);
  } catch {}
}

// ── Sensor-Charts ─────────────────────────────────────────────────────────────
async function loadSensorCharts() {
  const container = document.getElementById('sensorCharts');
  if (!container) return;
  container.innerHTML = '';
  Object.values(sensorCharts).forEach(c => { try { c.destroy(); } catch {} });
  sensorCharts = {};

  let history = [];
  try {
    const r = await fetch(`/api/data/history?hive_id=${encodeURIComponent(hiveId)}&hours=${sensorHours}`);
    history = await r.json();
  } catch {}

  // Group by sensor_name:key
  const groups = {};
  history.forEach(row => {
    const k = `${row.sensor_name}:${row.key}`;
    if (!groups[k]) groups[k] = { sensorName: row.sensor_name, key: row.key, rows: [] };
    groups[k].rows.push(row);
  });

  if (Object.keys(groups).length === 0) {
    container.innerHTML = `<div class="empty-state" style="padding:40px 0">
      <p>Keine Daten im gewählten Zeitraum.</p>
    </div>`;
    return;
  }

  Object.values(groups).forEach(({ sensorName, key, rows }) => {
    const unit  = UNITS[key] || '';
    const label = LABELS[key] || key.replace(/_/g, ' ');
    const color = thisHive ? thisHive.color : '#f59e0b';

    const wrap = document.createElement('div');
    wrap.className = 'chart-card';
    wrap.style.marginBottom = '16px';
    wrap.innerHTML = `
      <div style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
        ${label} <span style="font-weight:500;color:var(--text-muted);text-transform:none;letter-spacing:0"> — ${sensorName}</span>
      </div>
      <canvas id="sc_${sensorName}_${key}" height="160"></canvas>`;
    container.appendChild(wrap);

    const canvas = wrap.querySelector('canvas');
    const labels = rows.map(r => fmtDate(r.timestamp));
    const data   = rows.map(r => parseFloat(r.value));

    const chartKey = `${sensorName}:${key}`;
    sensorCharts[chartKey] = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: color,
          backgroundColor: color + '12',
          borderWidth: 1.8,
          pointRadius: rows.length > 120 ? 0 : 2.5,
          pointBackgroundColor: color,
          tension: 0.35, fill: true,
        }],
      },
      options: chartOptions(unit, color),
    });
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/api/hives');
    allHives = await r.json();
  } catch { allHives = []; }

  thisHive = allHives.find(h => h.id === hiveId) || null;

  const nameEl = document.getElementById('hiveName');
  const dotEl  = document.getElementById('hiveColorDot');
  const metaEl = document.getElementById('hiveMeta');

  if (thisHive) {
    document.title = `HaniPi – ${thisHive.name}`;
    if (nameEl) nameEl.textContent = thisHive.name;
    if (dotEl)  dotEl.style.background = thisHive.color;
  } else {
    if (nameEl) nameEl.textContent = 'Unbekannter Stock';
  }

  // Show sensor count in meta
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    const cnt = (cfg.sensors || []).filter(s => s.hive_id === hiveId).length;
    if (metaEl) metaEl.textContent = `${cnt} Sensor${cnt !== 1 ? 'en' : ''}`;
  } catch {}

  await loadWeightTrend();
  renderCompareButtons();
  await loadSensorCharts();

  // Sensor range buttons
  document.querySelectorAll('#sensorRange .time-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      sensorHours = parseInt(btn.dataset.h);
      document.querySelectorAll('#sensorRange .time-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      await loadSensorCharts();
    });
  });
}

init();
</script>
