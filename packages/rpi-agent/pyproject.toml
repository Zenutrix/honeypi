[project]
name = "honeypi-agent"
version = "2.0.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "influxdb-client>=1.40",
    "paho-mqtt>=2.0",
    "w1thermsensor>=2.0",
    "smbus2>=0.4",
    "RPi.bme280>=0.2",
    "bme680>=1.0",
    "adafruit-circuitpython-dht>=3.7",
    "adafruit-blinka>=8.0",
    "RPi.GPIO>=0.7",
]

[project.scripts]
honeypi-agent = "honeypi_agent.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-mock>=3.14",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
strict = true
