[project]
name = "hanipi-agent"
version = "2.0.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "influxdb-client>=1.45",
    "paho-mqtt>=2.0",
    "smbus2>=0.5",
    "RPi.bme280>=0.2.4",
    "bme680>=2.0",
    "rpi-lgpio>=0.6",
]

[project.optional-dependencies]
display = [
    "Pillow>=10.0",
]

[project.scripts]
hanipi-agent = "hanipi_agent.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-mock>=3.14",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
strict = true
